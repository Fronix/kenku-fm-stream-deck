<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
  </head>
  <body>
    <sdpi-item label="Track ID">
      <sdpi-textfield setting="id" placeholder="Enter track or playlist ID"></sdpi-textfield>
    </sdpi-item>
    <details>
      <summary>Advanced</summary>
      <sdpi-item label="Address">
        <sdpi-textfield setting="address" global placeholder="e.g. 127.0.0.1" value="127.0.0.1"></sdpi-textfield>
      </sdpi-item>
      <sdpi-item label="Port">
        <sdpi-textfield setting="port" global placeholder="e.g. 3333" value="3333"></sdpi-textfield>
      </sdpi-item>
    </details>
  </body>
</html>
